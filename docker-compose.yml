services:
  db:
    image: postgres:16-alpine
    container_name: mymel-db
    environment:
      POSTGRES_DB: mymel
      POSTGRES_USER: mymeluser
      POSTGRES_PASSWORD: mymelpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mymeluser -d mymel"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mymel-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mymel-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: mymel
      DB_USER: mymeluser
      DB_PASSWORD: mymelpassword
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mymel-network

networks:
  mymel-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
